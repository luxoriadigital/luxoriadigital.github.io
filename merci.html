<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Merci | Luxoria Digital</title>
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://luxoriadigital.be/merci.html">
<meta property="og:title" content="Merci | Luxoria Digital">
<meta property="og:description" content="Message envoyé avec succès. Nous vous répondrons sous 24h.">
<meta property="og:image" content="https://luxoriadigital.be/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#000;--navy:#060620;--blue:#1a1aff;--cyan:#00d4ff;--muted:#8892b0;--white:#fff}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px}
h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2rem,5vw,4rem);font-weight:700;text-transform:uppercase;line-height:.9;margin-bottom:20px}
.hero-grad{background:linear-gradient(90deg,#fff 0%,#7b87ff 48%,#00d4ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:var(--muted);font-size:1.1rem;line-height:1.8;margin-bottom:32px;max-width:500px;margin-left:auto;margin-right:auto}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;padding:14px 32px;background:linear-gradient(135deg,var(--blue),var(--cyan));color:var(--black);font-size:.8rem;text-transform:uppercase;letter-spacing:.18em;border-radius:9999px;border:none;box-shadow:0 18px 45px rgba(26,26,255,.28);text-decoration:none}
.btn-primary:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div>
  <h1><span class="hero-grad">Merci !</span></h1>
  <p>Votre message a bien été envoyé. Nous vous répondrons sous 24h, du lundi au samedi.</p>
  <a href="https://luxoriadigital.be" class="btn-primary">Retour à l'accueil</a>
</div>
</body>
</html>
